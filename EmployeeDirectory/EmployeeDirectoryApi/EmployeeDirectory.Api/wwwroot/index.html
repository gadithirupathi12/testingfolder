<!DOCTYPE html>
<html>
<head>
    <title>Employee Directory</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 420px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #333;
        }

        input {
            width: 65%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 5px;
            transition: 0.3s;
        }

        .add-btn {
            background-color: #4facfe;
            color: white;
        }

        .add-btn:hover {
            background-color: #00c6ff;
        }

        .delete-btn {
            background-color: red;
            color: white;
            margin-left: 10px;
        }

        .delete-btn:hover {
            background-color: darkred;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #f1f1f1;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Employee Directory</h1>

    <input type="text" id="name" placeholder="Enter employee name" />
    <button class="add-btn" onclick="addEmployee()">Add</button>

    <h3>Employees</h3>
    <ul id="list"></ul>

</div>

<script>
async function addEmployee() {
    const name = document.getElementById("name").value;

    if (!name) {
        alert("Enter a name");
        return;
    }

    const response = await fetch('/employees', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name })
    });

    if (!response.ok) {
        alert("API failed");
        return;
    }

    document.getElementById("name").value = "";
    loadEmployees();
}

async function deleteEmployee(id) {
    await fetch(`/employees/${id}`, {
        method: 'DELETE'
    });

    loadEmployees();
}

async function loadEmployees() {
    const res = await fetch('/employees');
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(emp => {
        const li = document.createElement("li");

        li.innerHTML = `
            ${emp.name}
            <button class="delete-btn" onclick="deleteEmployee(${emp.id})">Delete</button>
        `;

        list.appendChild(li);
    });
}

// Load data on page load
loadEmployees();
</script>

</body>
</html>
